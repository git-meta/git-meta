<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} · git-meta</title>
    <meta name="description" content="git-meta project documentation generated from the canonical spec markdown files.">
    <link rel="stylesheet" href="{{root}}assets/style.css">
    <script>
      (() => {
        const stored = localStorage.getItem('git-meta-theme');
        document.documentElement.dataset.theme = stored || 'system';
      })();
    </script>
  </head>
  <body class="{{body_class}}">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-main">
          <a class="brand" href="{{root}}index.html">
            <img class="brand-icon" src="{{root}}../other/git-meta-icon.png" alt="" width="40" height="40">
            <span class="brand-text">git-meta</span>
          </a>
          <p class="tagline">Git metadata specification and project docs</p>
          <nav class="nav">
            {{nav}}
          </nav>
        </div>
        <div class="sidebar-footer">
          <div class="theme-control" aria-label="Theme switcher">
            <button type="button" class="theme-icon-button" data-theme-value="light" aria-label="Use light theme" title="Light theme">
              <span aria-hidden="true">☀️</span>
            </button>
            <button type="button" class="theme-icon-button" data-theme-value="dark" aria-label="Use dark theme" title="Dark theme">
              <span aria-hidden="true">🌙</span>
            </button>
          </div>
          <button type="button" class="sidebar-toggle" aria-label="Collapse sidebar" title="Collapse sidebar">
            <span class="collapse-icon" aria-hidden="true">◧</span>
          </button>
        </div>
      </aside>
      <main class="content">
        <header class="page-header">
          <div class="page-header-main">
            <div class="eyebrow">Generated from <a href="https://github.com/git-meta/git-meta/tree/main/spec"><code>spec/*.md</code></a></div>
            <h1>{{title}}</h1>
          </div>
          <a class="page-source-link" href="{{markdown_url}}" rel="noopener" title="View raw markdown source on GitHub">
            <span aria-hidden="true">{ }</span>
            <span>markdown</span>
          </a>
        </header>
        <article class="doc-content{{content_class}}">
          {{content}}
        </article>
      </main>
      {{toc}}
    </div>
    <script>
      (() => {
        const root = document.documentElement;
        const sidebar = document.querySelector('.sidebar');
        const themeButtons = document.querySelectorAll('.theme-icon-button');
        const sidebarToggle = document.querySelector('.sidebar-toggle');
        const media = window.matchMedia('(prefers-color-scheme: dark)');

        function currentTheme() {
          return localStorage.getItem('git-meta-theme') || 'system';
        }

        function applyTheme(theme) {
          root.dataset.theme = theme;
          const effective = theme === 'system' ? (media.matches ? 'dark' : 'light') : theme;
          themeButtons.forEach((button) => {
            button.classList.toggle('active', button.dataset.themeValue === effective);
          });
        }

        function currentSidebarState() {
          return localStorage.getItem('git-meta-sidebar') || 'expanded';
        }

        function applySidebarState(state) {
          const collapsed = state === 'collapsed';
          sidebar.classList.toggle('collapsed', collapsed);
          document.body.classList.toggle('sidebar-collapsed', collapsed);
          sidebarToggle.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
          sidebarToggle.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
        }

        themeButtons.forEach((button) => {
          button.addEventListener('click', () => {
            localStorage.setItem('git-meta-theme', button.dataset.themeValue);
            applyTheme(button.dataset.themeValue);
          });
        });

        sidebarToggle.addEventListener('click', () => {
          const next = currentSidebarState() === 'collapsed' ? 'expanded' : 'collapsed';
          localStorage.setItem('git-meta-sidebar', next);
          applySidebarState(next);
        });

        media.addEventListener?.('change', () => {
          if (currentTheme() === 'system') {
            applyTheme('system');
          }
        });

        applyTheme(currentTheme());
        applySidebarState(currentSidebarState());

        // Right-hand TOC scroll-spy: highlight the toc link whose target
        // heading is currently nearest the top of the viewport. Uses
        // IntersectionObserver so it stays cheap on long pages.
        const tocLinks = document.querySelectorAll('.toc-aside a[href^="#"]');
        if (tocLinks.length) {
          const linkByAnchor = new Map();
          const headings = [];
          tocLinks.forEach((a) => {
            const id = a.getAttribute('href').slice(1);
            const heading = id ? document.getElementById(id) : null;
            if (heading) {
              linkByAnchor.set(id, a);
              headings.push(heading);
            }
          });
          const setActive = (id) => {
            tocLinks.forEach((a) => a.classList.remove('active'));
            const link = id && linkByAnchor.get(id);
            if (link) link.classList.add('active');
          };
          const observer = new IntersectionObserver(
            (entries) => {
              const visible = entries
                .filter((e) => e.isIntersecting)
                .sort((a, b) => a.target.getBoundingClientRect().top - b.target.getBoundingClientRect().top);
              if (visible.length) setActive(visible[0].target.id);
            },
            { rootMargin: '-15% 0% -75% 0%', threshold: 0 }
          );
          headings.forEach((h) => observer.observe(h));
        }
      })();
    </script>
  </body>
</html>
